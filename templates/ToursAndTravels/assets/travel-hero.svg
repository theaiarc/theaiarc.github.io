<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Tours and Travels — sunset over mountains and sea with an airplane">
  <defs>
    <!-- Sky: warm sunset -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3b1d60"/>
      <stop offset="38%" stop-color="#b5347a"/>
      <stop offset="70%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff7ed" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Mountain layers -->
    <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aa6"/>
      <stop offset="100%" stop-color="#9d4eb0"/>
    </linearGradient>
    <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b2a86"/>
      <stop offset="100%" stop-color="#74308f"/>
    </linearGradient>
    <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1c5c"/>
      <stop offset="100%" stop-color="#4a2270"/>
    </linearGradient>
    <!-- Sea -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fb923c"/>
      <stop offset="22%" stop-color="#e06a8f"/>
      <stop offset="100%" stop-color="#2a1b4a"/>
    </linearGradient>
    <linearGradient id="sunPath" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="seaClip"><rect x="0" y="400" width="1200" height="230"/></clipPath>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="400" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="120" cy="60" r="2"/><circle cx="240" cy="110" r="1.5"/><circle cx="80" cy="150" r="1.5"/>
    <circle cx="360" cy="50" r="1.8"/><circle cx="980" cy="70" r="2"/><circle cx="1080" cy="130" r="1.5"/>
    <circle cx="1140" cy="50" r="1.8"/><circle cx="900" cy="40" r="1.4"/><circle cx="200" cy="40" r="1.3"/>
  </g>

  <!-- Sun glow + sun -->
  <circle cx="600" cy="360" r="240" fill="url(#sunGlow)"/>
  <circle cx="600" cy="360" r="96" fill="url(#sun)"/>

  <!-- Birds -->
  <g stroke="#2a1b4a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M150 120 q12 -10 24 0 q12 -10 24 0"/>
    <path d="M210 150 q9 -7 18 0 q9 -7 18 0"/>
    <path d="M1000 160 q10 -8 20 0 q10 -8 20 0"/>
  </g>

  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.25">
    <ellipse cx="320" cy="200" rx="90" ry="22"/>
    <ellipse cx="860" cy="230" rx="110" ry="26"/>
  </g>

  <!-- Airplane with dashed flight path -->
  <path d="M120 300 Q420 110 1080 200" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="2 12" stroke-linecap="round" opacity="0.85"/>
  <g transform="translate(1080 200) rotate(20)">
    <path d="M0 0 L-46 14 L-30 2 L-46 -10 Z" fill="#ffffff"/>
    <path d="M-22 1 L-2 -22 L4 -20 L-10 3 Z" fill="#e2e8f0"/>
    <path d="M-22 1 L-4 20 L2 18 L-12 1 Z" fill="#e2e8f0"/>
  </g>

  <!-- Mountains -->
  <path d="M0 400 L0 300 L180 150 L330 290 L470 180 L600 320 L740 200 L900 330 L1060 210 L1200 320 L1200 400 Z" fill="url(#mtnFar)"/>
  <path d="M0 400 L0 360 L150 250 L320 380 L460 270 L640 400 Z" fill="url(#mtnMid)"/>
  <path d="M560 400 L760 250 L920 380 L1080 280 L1200 360 L1200 400 Z" fill="url(#mtnMid)"/>
  <!-- Snow caps -->
  <g fill="#ffffff" opacity="0.92">
    <path d="M180 150 L150 185 L172 178 L186 192 L205 175 Z"/>
    <path d="M760 250 L735 282 L754 274 L767 287 L784 270 Z"/>
  </g>

  <!-- Sea -->
  <rect x="0" y="400" width="1200" height="230" fill="url(#sea)"/>
  <!-- Sun reflection -->
  <rect x="575" y="400" width="50" height="230" fill="url(#sunPath)"/>
  <!-- Water ripples -->
  <g clip-path="url(#seaClip)" stroke="#ffe7c2" stroke-linecap="round" opacity="0.5">
    <line x1="540" y1="440" x2="660" y2="440" stroke-width="3"/>
    <line x1="560" y1="470" x2="640" y2="470" stroke-width="3"/>
    <line x1="520" y1="505" x2="680" y2="505" stroke-width="3"/>
    <line x1="150" y1="520" x2="260" y2="520" stroke-width="2" opacity="0.4"/>
    <line x1="940" y1="540" x2="1060" y2="540" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Sailboat -->
  <g transform="translate(330 470)">
    <path d="M-46 36 L46 36 L34 58 L-34 58 Z" fill="#1f1336"/>
    <path d="M0 -52 L0 32" stroke="#1f1336" stroke-width="4"/>
    <path d="M4 -48 L42 28 L4 28 Z" fill="#fb7185"/>
    <path d="M-4 -36 L-34 28 L-4 28 Z" fill="#fdba74"/>
  </g>

  <!-- Title -->
  <g font-family="'Poppins','Segoe UI',sans-serif" text-anchor="middle">
    <text x="600" y="300" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="1">TOURS &amp; TRAVELS</text>
    <text x="600" y="346" font-size="26" font-weight="500" fill="#ffe7c2" letter-spacing="6">EXPLORE • DREAM • DISCOVER</text>
  </g>
</svg>
