<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Maison Decor — Home Decor and Interior Styling">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#faf6f0"/>
      <stop offset="1" stop-color="#f1e7da"/>
    </linearGradient>
    <linearGradient id="arch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8916b"/>
      <stop offset="1" stop-color="#bf6240"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="560" r="220" fill="#bf6240" opacity="0.05"/>

  <!-- ===================== Brand lockup ===================== -->
  <rect x="80" y="60" width="50" height="50" rx="13" fill="#bf6240"/>
  <text x="105" y="95" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="30" fill="#ffffff">M</text>
  <text x="146" y="93" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="19" letter-spacing="4" fill="#2c2620">MAISON DECOR</text>

  <!-- ===================== Headline block ===================== -->
  <text x="82" y="232" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="3.5" fill="#bf6240">HOME DECOR · INTERIOR STYLING</text>

  <text x="78" y="312" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="64" fill="#2c2620">Make every room</text>
  <text x="78" y="384" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="64" fill="#2c2620">feel like <tspan font-style="italic" fill="#bf6240">home.</tspan></text>

  <text x="82" y="438" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#6b5d50">Curated pieces &amp; interior styling for</text>
  <text x="82" y="468" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#6b5d50">warm, characterful homes.</text>

  <!-- Pill -->
  <rect x="80" y="506" width="272" height="56" rx="28" fill="#bf6240"/>
  <text x="116" y="542" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="20" fill="#ffffff">Shop the collection</text>
  <path d="M322 534 l12 0 m-5 -5 l5 5 l-5 5" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===================== Arch + decor still-life ===================== -->
  <g>
    <!-- Arch backdrop -->
    <path d="M750 575 L750 250 A180 180 0 0 1 1110 250 L1110 575 Z" fill="url(#arch)"/>
    <!-- Inset gold outline -->
    <path d="M782 567 L782 258 A148 148 0 0 1 1078 258 L1078 567" fill="none" stroke="#e8c98a" stroke-width="2" opacity="0.55"/>

    <!-- Decor drawn in cream line-art on the arch -->
    <g fill="none" stroke="#f7efe2" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">

      <!-- Pendant light -->
      <line x1="930" y1="96" x2="930" y2="150"/>
      <path d="M892 150 A38 30 0 0 1 968 150 Z" fill="#f7efe2" opacity="0.14"/>
      <path d="M892 150 A38 30 0 0 1 968 150"/>
      <line x1="911" y1="124" x2="911" y2="150"/>
      <line x1="930" y1="118" x2="930" y2="150"/>
      <line x1="949" y1="124" x2="949" y2="150"/>
      <line x1="924" y1="160" x2="936" y2="160"/>

      <!-- Console / shelf -->
      <line x1="800" y1="470" x2="1062" y2="470"/>
      <line x1="822" y1="473" x2="822" y2="548"/>
      <line x1="1040" y1="473" x2="1040" y2="548"/>

      <!-- Vase with branches (left) -->
      <path d="M828 466 C819 432 825 410 847 406 C869 410 875 432 866 466 Z"/>
      <path d="M847 406 C846 384 840 366 824 352"/>
      <path d="M847 406 C850 384 860 366 876 354"/>
      <ellipse cx="819" cy="349" rx="8" ry="4.5" transform="rotate(-35 819 349)"/>
      <ellipse cx="881" cy="351" rx="8" ry="4.5" transform="rotate(35 881 351)"/>
      <ellipse cx="838" cy="372" rx="7" ry="4" transform="rotate(-20 838 372)"/>

      <!-- Table lamp (centre) -->
      <path d="M916 466 L922 442 L938 442 L944 466 Z"/>
      <line x1="930" y1="442" x2="930" y2="408"/>
      <path d="M902 408 L958 408 L970 372 L890 372 Z"/>

      <!-- Framed arch print (right) -->
      <path d="M996 468 L996 410 A22 22 0 0 1 1040 410 L1040 468 Z"/>
      <path d="M1006 466 L1006 414 A12 12 0 0 1 1030 414 L1030 466"/>

      <!-- Small potted plant in front -->
      <path d="M872 506 L877 532 L905 532 L910 506 Z"/>
      <path d="M886 506 C880 486 872 476 862 470"/>
      <path d="M891 506 C891 484 895 472 903 462"/>
      <path d="M896 506 C902 488 912 480 922 478"/>
    </g>
  </g>

  <!-- baseline tag -->
  <text x="82" y="598" font-family="Helvetica, Arial, sans-serif" font-size="14" letter-spacing="1.5" fill="#9b8d7c">maisondecor.example</text>
</svg>
